server:
  port: 8000

spring:
  application:
    name: api-gateway

  cloud:
    discovery:
      enabled: false

    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/user-service/**
              filters:
                - StripPrefix=1

            - id: order-service
              uri: http://localhost:8082
              predicates:
                - Path=/order-service/**
              filters:
                - StripPrefix=1

eureka:
  client:
    enabled: false

