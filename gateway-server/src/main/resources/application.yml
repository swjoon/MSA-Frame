server:
  port: 8000

spring:
  application:
    name: gateway-server

  cloud:
    discovery:
      enabled: false

    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:8080
              predicates:
                - Path=/user-service/**

            - id: item-service
              uri: http://localhost:8081
              predicates:
                - Path=/item-service/**

            - id: order-service
              uri: http://localhost:8082
              predicates:
                - Path=/order-service/**

eureka:
  client:
    enabled: false

management:
  endpoint:
    gateway:
      access: unrestricted
  endpoints:
    web:
      exposure:
        include: gateway



