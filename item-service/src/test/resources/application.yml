spring:
  application:
    name: item-service

  datasource:
    url: jdbc:h2:mem:test;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      mode: never

  h2:
    console:
      enabled: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      '[hibernate.default_batch_fetch_size]': 100
      '[hibernate.format_sql]': true
    show-sql: true

  output:
    ansi:
      enabled: always

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379
      password:
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8

logging:
  level:
    org.springframework: INFO
    app.backend.backend: DEBUG